name = "subscription-manager"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "subscription-manager"

[env.staging]
name = "subscription-manager-staging"

# KV 命名空间配置
[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "facc1ce766e7471ca7f97af49de7b33a" # 👈 记得换成你的真实 ID！

# 静态资源：托管 public/ 目录下的 JS/CSS/HTML 给浏览器
[assets]
directory = "./public"
binding = "ASSETS"

# 定时任务配置 - 每小时检查一次（UTC）
[triggers]
crons = ["0 * * * *"]

# 环境变量
[vars]
ENVIRONMENT = "production"
